services:
  app:
    build: .
    restart: unless-stopped
    network_mode: host
    mem_limit: 768m
    cpus: 0.5
    environment:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SERVER_TOMCAT_THREADS_MAX: 30
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    restart: unless-stopped
    network_mode: host
    mem_limit: 1536m
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
    cpus: 1.0
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    restart: unless-stopped
    network_mode: host
    mem_limit: 256m
    cpus: 0.3
    command: ["redis-server", "--maxmemory", "200mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    network_mode: host
    mem_limit: 128m
    cpus: 0.2
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs

  prometheus:
    image: prom/prometheus:v2.53.4
    restart: unless-stopped
    network_mode: host
    mem_limit: 256m
    cpus: 0.3
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.6.1
    restart: unless-stopped
    network_mode: host
    mem_limit: 512m
    cpus: 0.3
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://api.guilherme-narciso.dev/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: UTC
      GF_LOCALE: en-US
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
