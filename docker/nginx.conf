worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # Gzip
  gzip on;
  gzip_types application/json text/plain application/xml;
  gzip_min_length 1024;

  # Hide nginx version
  server_tokens off;

  # IP direto — HTTP apenas (LE não emite cert para IP)
  server {
    listen 80;
    server_name 185.198.27.42;

    location / {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://localhost:8080;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name guilherme-narciso.dev;

    # Necessario para renovacao do Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name guilherme-narciso.dev;

    ssl_certificate     /etc/letsencrypt/live/guilherme-narciso.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guilherme-narciso.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # Auth — rate limit agressivo
    location /auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://localhost:8080;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location / {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://localhost:8080;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
