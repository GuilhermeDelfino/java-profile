server:
  servlet:
    context-path: /java-profile
  forward-headers-strategy: framework

spring:
  application:
    name: profile

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:profile}
    username: ${DB_USERNAME:profile}
    password: ${DB_PASSWORD:profile}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

loki:
  url: ${LOKI_URL:http://localhost:3100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: java-profile
jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWRldi1vbmx5LTMyYnl0ZXM=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}
